deploymentMode: monolithic-mode

minio:
  enabled: false

nginx:
  enabled: false

gateway:
  enabled: false

rollout-operator:
  enabled: false

enterprise-metrics:
  enabled: false

mimir:
  structuredConfig:
    common:
      storage:
        backend: filesystem
        filesystem:
          dir: /data
    ingester:
      ring:
        replication_factor: 1
        kvstore:
          store: memberlist
    store_gateway:
      sharding_ring:
        replication_factor: 1
    compactor:
      sharding_ring:
        wait_stability_min_duration: 0
    alertmanager_storage:
      backend: local
    ruler_storage:
      backend: local
    limits:
      ingestion_rate: 100000
      max_global_series_per_user: 1000000
